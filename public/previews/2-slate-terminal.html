<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme 2 — Slate Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --title:'Space Grotesk',sans-serif; --title-w:700;
  /* Slate Terminal — cool blue-grey, sharper borders, a trading-desk feel */
  --bg:#0E1420; --sur:#141C2B; --sur2:#1B2536;
  --brd:rgba(120,150,200,.14); --brd2:rgba(120,150,200,.09); --brd-w:1px;
  --txt:#E6EDF7; --txt2:#8A9BB5; --txt3:#5A6B85;
  --acc:#4FB8FF; --grn:#3DD68C; --red:#FF6B7A; --blu:#4FB8FF; --pur:#9D8CFF;
  --acc-bg:rgba(79,184,255,.14); --grn-bg:rgba(61,214,140,.13); --red-bg:rgba(255,107,122,.13);
  --side-bg:#0B111C; --hdr-bg:rgba(14,20,32,calc(var(--hdr-t)*.82)); --hdr-brd:rgba(120,150,200,calc(var(--hdr-t)*.18));
}
.hdr-val{background:none;-webkit-text-fill-color:initial;color:var(--grn);}
</style>
<link rel="stylesheet" href="_base.css">
</head><body>
<div id="app"></div>
<div class="theme-tag">SLATE TERMINAL<a href="index.html">all ↗</a></div>
<script src="_dashboard.js"></script>
<script>
const m=document.querySelector('.main');
m.addEventListener('scroll',()=>{document.querySelector('.main-header').style.setProperty('--hdr-t',Math.min(1,m.scrollTop/120));},{passive:true});
</script>
</body></html>
