<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme 3 — Warm Paper (Light)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --title:'Fraunces',serif; --title-w:500;
  /* Warm Paper — a light, editorial cream theme. Calm, premium, print-like. */
  --bg:#F6F3EC; --sur:#FFFFFF; --sur2:#F0ECE2;
  --brd:rgba(60,50,35,.12); --brd2:rgba(60,50,35,.07); --brd-w:1px;
  --txt:#26211A; --txt2:#6E6555; --txt3:#9C9384;
  --acc:#C8780F; --grn:#1F9D6B; --red:#C9483F; --blu:#3B7BC4; --pur:#7B5FD0;
  --acc-bg:rgba(200,120,15,.12); --grn-bg:rgba(31,157,107,.12); --red-bg:rgba(201,72,63,.1);
  --side-bg:#EFEADF; --hdr-bg:rgba(246,243,236,calc(var(--hdr-t)*.85)); --hdr-brd:rgba(60,50,35,calc(var(--hdr-t)*.14));
}
.hdr-val{background:none;-webkit-text-fill-color:initial;color:var(--grn);}
.card,.csm,.hkpi{box-shadow:0 1px 3px rgba(60,50,35,.05);}
</style>
<link rel="stylesheet" href="_base.css">
</head><body>
<div id="app"></div>
<div class="theme-tag">WARM PAPER<a href="index.html">all ↗</a></div>
<script src="_dashboard.js"></script>
<script>
const m=document.querySelector('.main');
m.addEventListener('scroll',()=>{document.querySelector('.main-header').style.setProperty('--hdr-t',Math.min(1,m.scrollTop/120));},{passive:true});
</script>
</body></html>
