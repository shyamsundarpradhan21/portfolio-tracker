<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme 6 — Oceanic Teal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --title:'Sora',sans-serif; --title-w:700;
  /* Oceanic Teal — deep sea navy-teal with aqua highlights. Cool, immersive. */
  --bg:#071A1F; --sur:rgba(64,200,210,.05); --sur2:rgba(64,200,210,.09);
  --brd:rgba(64,200,210,.14); --brd2:rgba(64,200,210,.08); --brd-w:.5px;
  --txt:#E4F4F4; --txt2:#7FA8AB; --txt3:#4E7174;
  --acc:#F2B84B; --grn:#34E0B0; --red:#FF7B86; --blu:#3FC8E0; --pur:#7FD4E0;
  --acc-bg:rgba(242,184,75,.13); --grn-bg:rgba(52,224,176,.12); --red-bg:rgba(255,123,134,.12);
  --side-bg:#051418; --hdr-bg:rgba(7,26,31,calc(var(--hdr-t)*.82)); --hdr-brd:rgba(64,200,210,calc(var(--hdr-t)*.16));
}
.hdr-val{background:linear-gradient(100deg,#34E0B0,#3FC8E0,#34E0B0);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style>
<link rel="stylesheet" href="_base.css">
</head><body>
<div id="app"></div>
<div class="theme-tag">OCEANIC TEAL<a href="index.html">all ↗</a></div>
<script src="_dashboard.js"></script>
<script>
const m=document.querySelector('.main');
m.addEventListener('scroll',()=>{document.querySelector('.main-header').style.setProperty('--hdr-t',Math.min(1,m.scrollTop/120));},{passive:true});
</script>
</body></html>
