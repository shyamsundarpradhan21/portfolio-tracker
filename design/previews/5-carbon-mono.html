<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme 5 — Carbon Mono</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --title:'Inter',sans-serif; --title-w:800;
  /* Carbon Mono — pure greyscale, zero hue except red/green for P&L. Brutalist, focused. */
  --bg:#000000; --sur:#0D0D0D; --sur2:#171717;
  --brd:rgba(255,255,255,.1); --brd2:rgba(255,255,255,.06); --brd-w:1px;
  --txt:#FFFFFF; --txt2:#8A8A8A; --txt3:#555555;
  --acc:#FFFFFF; --grn:#3DD68C; --red:#FF5C5C; --blu:#FFFFFF; --pur:#BBBBBB;
  --acc-bg:rgba(255,255,255,.1); --grn-bg:rgba(61,214,140,.12); --red-bg:rgba(255,92,92,.12);
  --side-bg:#080808; --hdr-bg:rgba(0,0,0,calc(var(--hdr-t)*.85)); --hdr-brd:rgba(255,255,255,calc(var(--hdr-t)*.12));
}
.hdr-val{background:none;-webkit-text-fill-color:initial;color:#fff;}
.nav-item.active{box-shadow:inset 3px 0 0 #fff;}
.ctitle{text-transform:uppercase;letter-spacing:1px;font-size:15px;}
</style>
<link rel="stylesheet" href="_base.css">
</head><body>
<div id="app"></div>
<div class="theme-tag" style="background:#fff;color:#000">CARBON MONO<a href="index.html">all ↗</a></div>
<script src="_dashboard.js"></script>
<script>
const m=document.querySelector('.main');
m.addEventListener('scroll',()=>{document.querySelector('.main-header').style.setProperty('--hdr-t',Math.min(1,m.scrollTop/120));},{passive:true});
</script>
</body></html>
