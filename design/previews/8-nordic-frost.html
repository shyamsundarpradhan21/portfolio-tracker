<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme 8 — Nordic Frost (Light)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --title:'Inter',sans-serif; --title-w:700;
  /* Nordic Frost — cool light grey-blue minimal. Crisp, airy, Scandinavian. */
  --bg:#F4F6FA; --sur:#FFFFFF; --sur2:#ECF0F6;
  --brd:rgba(40,60,90,.1); --brd2:rgba(40,60,90,.06); --brd-w:1px;
  --txt:#1C2533; --txt2:#5E6B80; --txt3:#94A0B4;
  --acc:#2E6FE6; --grn:#13A871; --red:#E1453B; --blu:#2E6FE6; --pur:#7B5FD0;
  --acc-bg:rgba(46,111,230,.1); --grn-bg:rgba(19,168,113,.1); --red-bg:rgba(225,69,59,.09);
  --side-bg:#FFFFFF; --hdr-bg:rgba(244,246,250,calc(var(--hdr-t)*.85)); --hdr-brd:rgba(40,60,90,calc(var(--hdr-t)*.12));
}
.hdr-val{background:none;-webkit-text-fill-color:initial;color:var(--grn);}
.card,.csm,.hkpi{box-shadow:0 1px 3px rgba(40,60,90,.06);}
.ctitle{letter-spacing:-.3px;}
</style>
<link rel="stylesheet" href="_base.css">
</head><body>
<div id="app"></div>
<div class="theme-tag" style="color:#fff">NORDIC FROST<a href="index.html" style="color:#fff">all ↗</a></div>
<script src="_dashboard.js"></script>
<script>
const m=document.querySelector('.main');
m.addEventListener('scroll',()=>{document.querySelector('.main-header').style.setProperty('--hdr-t',Math.min(1,m.scrollTop/120));},{passive:true});
</script>
</body></html>
